version: '3.9'

x-backend-env: &backend-env
  FLASK_ENV: development
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: nutrition_db
  POSTGRES_USER: nutrition
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutrition_dev}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_DB: 0
  REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
  SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
  DINGTALK_APP_KEY: ${DINGTALK_APP_KEY:-}
  DINGTALK_APP_SECRET: ${DINGTALK_APP_SECRET:-}
  DINGTALK_AGENT_ID: ${DINGTALK_AGENT_ID:-}
  DINGTALK_CORP_ID: ${DINGTALK_CORP_ID:-}
  DINGTALK_WEBHOOK_TOKEN: ${DINGTALK_WEBHOOK_TOKEN:-}
  QWEN_API_KEY: ${QWEN_API_KEY:-}
  QWEN_API_URL: ${QWEN_API_URL:-https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation}
  QWEN_MODEL: ${QWEN_MODEL:-qwen-vl-max}
  DISH_RECOGNITION_MODE: ${DISH_RECOGNITION_MODE:-local_embedding}
  LOCAL_MODEL_MANAGEMENT_MODE: ${LOCAL_MODEL_MANAGEMENT_MODE:-local}
  LOCAL_RECOGNITION_MODEL_VERSION: ${LOCAL_RECOGNITION_MODEL_VERSION:-qwen3_vl_embedding}
  HF_ENDPOINT: ${HF_ENDPOINT:-}
  LOCAL_MODEL_STORAGE_PATH: ${LOCAL_MODEL_STORAGE_PATH:-/data/models}
  LOCAL_QWEN3_VL_EMBEDDING_REPO_ID: ${LOCAL_QWEN3_VL_EMBEDDING_REPO_ID:-Qwen/Qwen3-VL-Embedding-2B}
  LOCAL_QWEN3_VL_EMBEDDING_MODEL_PATH: ${LOCAL_QWEN3_VL_EMBEDDING_MODEL_PATH:-/data/models/qwen3-vl-embedding-2b}
  LOCAL_QWEN3_VL_EMBEDDING_INSTRUCTION: ${LOCAL_QWEN3_VL_EMBEDDING_INSTRUCTION:-}
  LOCAL_QWEN3_VL_RERANKER_REPO_ID: ${LOCAL_QWEN3_VL_RERANKER_REPO_ID:-Qwen/Qwen3-VL-Reranker-2B}
  LOCAL_QWEN3_VL_RERANKER_MODEL_PATH: ${LOCAL_QWEN3_VL_RERANKER_MODEL_PATH:-/data/models/qwen3-vl-reranker-2b}
  LOCAL_QWEN3_VL_RERANKER_INSTRUCTION: ${LOCAL_QWEN3_VL_RERANKER_INSTRUCTION:-检索与当前餐盘菜区最相关的食堂菜品图片。}
  LOCAL_EMBEDDING_INDEX_DIR: ${LOCAL_EMBEDDING_INDEX_DIR:-/data/images/embedding_index}
  LOCAL_EMBEDDING_SIMILARITY_THRESHOLD: ${LOCAL_EMBEDDING_SIMILARITY_THRESHOLD:-0.35}
  LOCAL_EMBEDDING_TOPK: ${LOCAL_EMBEDDING_TOPK:-5}
  LOCAL_RERANK_TOPN: ${LOCAL_RERANK_TOPN:-5}
  LOCAL_RERANK_SCORE_THRESHOLD: ${LOCAL_RERANK_SCORE_THRESHOLD:-0.5}
  LOCAL_REBUILD_SAMPLE_EMBEDDINGS_ON_UPLOAD: ${LOCAL_REBUILD_SAMPLE_EMBEDDINGS_ON_UPLOAD:-true}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
  OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-chat}
  STABLE_FRAME_OFFSET_S: ${STABLE_FRAME_OFFSET_S:-0.2}
  ROI_REGION: '${ROI_REGION:-null}'
  PLATE_PIXEL_THRESHOLD: ${PLATE_PIXEL_THRESHOLD:-5000}
  TRAY_HSV_LOWER: '${TRAY_HSV_LOWER:-[5,70,70]}'
  TRAY_HSV_UPPER: '${TRAY_HSV_UPPER:-[35,255,255]}'
  TRAY_MIN_AREA_RATIO: ${TRAY_MIN_AREA_RATIO:-0.06}
  TRAY_MAX_AREA_RATIO: ${TRAY_MAX_AREA_RATIO:-0.75}
  TRAY_MIN_ASPECT_RATIO: ${TRAY_MIN_ASPECT_RATIO:-1.1}
  TRAY_MAX_ASPECT_RATIO: ${TRAY_MAX_ASPECT_RATIO:-2.8}
  TRAY_MIN_FILL_RATIO: ${TRAY_MIN_FILL_RATIO:-0.35}
  TRAY_EDGE_MARGIN_RATIO: ${TRAY_EDGE_MARGIN_RATIO:-0.02}
  TRAY_CENTER_MAX_RATIO: ${TRAY_CENTER_MAX_RATIO:-0.9}
  EVENT_SCAN_FPS: ${EVENT_SCAN_FPS:-6.0}
  EVENT_START_MOTION_THRESHOLD: ${EVENT_START_MOTION_THRESHOLD:-15}
  EVENT_START_FG_RATIO: ${EVENT_START_FG_RATIO:-0.008}
  EVENT_END_QUIET_S: ${EVENT_END_QUIET_S:-0.8}
  EVENT_PAD_BEFORE_S: ${EVENT_PAD_BEFORE_S:-0.4}
  EVENT_PAD_AFTER_S: ${EVENT_PAD_AFTER_S:-2.5}
  EVENT_MERGE_GAP_S: ${EVENT_MERGE_GAP_S:-0.6}
  POST_EVENT_SEARCH_S: ${POST_EVENT_SEARCH_S:-2.0}
  STABLE_FLOW_THRESHOLD: ${STABLE_FLOW_THRESHOLD:-1.2}
  MAX_OUTSIDE_FG_RATIO: ${MAX_OUTSIDE_FG_RATIO:-0.03}
  MIN_STABLE_RUN_S: ${MIN_STABLE_RUN_S:-0.25}
  STABLE_GAP_FRAMES: ${STABLE_GAP_FRAMES:-2}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
  INFERENCE_API_TOKEN: ${INFERENCE_API_TOKEN:-inference-dev-token}
  INFERENCE_API_TIMEOUT: ${INFERENCE_API_TIMEOUT:-180}
  INFERENCE_CONTROL_TIMEOUT: ${INFERENCE_CONTROL_TIMEOUT:-3}
  DETECTOR_API_BASE_URL: ${DETECTOR_API_BASE_URL:-http://detector-api:5000}
  RETRIEVAL_API_BASE_URL: ${RETRIEVAL_API_BASE_URL:-http://retrieval-api:5000}
  YOLO_MAX_REGIONS: ${YOLO_MAX_REGIONS:-6}

x-inference-env: &inference-env
  FLASK_ENV: development
  INFERENCE_API_TOKEN: ${INFERENCE_API_TOKEN:-inference-dev-token}
  INFERENCE_API_TIMEOUT: ${INFERENCE_API_TIMEOUT:-180}
  INFERENCE_SERVICE_ROLE: ${INFERENCE_SERVICE_ROLE:-all}
  HF_ENDPOINT: ${HF_ENDPOINT:-}
  YOLO_MODEL_PATH: ${YOLO_MODEL_PATH:-/models/yolo/best.pt}
  YOLO_DEVICE: ${YOLO_DEVICE:-}
  YOLO_CONF_THRESHOLD: ${YOLO_CONF_THRESHOLD:-0.75}
  YOLO_IOU_THRESHOLD: ${YOLO_IOU_THRESHOLD:-0.45}
  YOLO_MAX_REGIONS: ${YOLO_MAX_REGIONS:-6}
  LOCAL_MODEL_STORAGE_PATH: ${INFERENCE_LOCAL_MODEL_STORAGE_PATH:-/data/models}
  LOCAL_QWEN3_VL_EMBEDDING_MODEL_PATH: ${INFERENCE_LOCAL_QWEN3_VL_EMBEDDING_MODEL_PATH:-/data/models/qwen3-vl-embedding-2b}
  LOCAL_QWEN3_VL_RERANKER_MODEL_PATH: ${INFERENCE_LOCAL_QWEN3_VL_RERANKER_MODEL_PATH:-/data/models/qwen3-vl-reranker-2b}
  LOCAL_QWEN3_VL_EMBEDDING_INSTRUCTION: ${LOCAL_QWEN3_VL_EMBEDDING_INSTRUCTION:-}
  LOCAL_QWEN3_VL_RERANKER_INSTRUCTION: ${LOCAL_QWEN3_VL_RERANKER_INSTRUCTION:-检索与当前餐盘菜区最相关的食堂菜品图片。}
  LOCAL_EMBEDDING_INDEX_DIR: ${INFERENCE_LOCAL_EMBEDDING_INDEX_DIR:-/data/index}
  LOCAL_EMBEDDING_SIMILARITY_THRESHOLD: ${LOCAL_EMBEDDING_SIMILARITY_THRESHOLD:-0.35}
  LOCAL_EMBEDDING_TOPK: ${LOCAL_EMBEDDING_TOPK:-5}
  LOCAL_RERANK_TOPN: ${LOCAL_RERANK_TOPN:-5}
  LOCAL_RERANK_SCORE_THRESHOLD: ${LOCAL_RERANK_SCORE_THRESHOLD:-0.5}

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nutrition_db
      POSTGRES_USER: nutrition
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutrition_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrition -d nutrition_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  flask-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: /bin/sh -c "flask bootstrap-db && exec gunicorn --bind 0.0.0.0:5000 --workers 2 --reload --timeout 120 wsgi:app"
    volumes:
      - ./backend:/app
      - ${DATA_DIR:-./data}/nvr_cache:/data/nvr_cache
      - ${DATA_DIR:-./data}/images:/data/images
      - ${DATA_DIR:-./data}/models:/data/models
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A wsgi:celery worker --loglevel=info --concurrency=4 -Q celery
    volumes:
      - ./backend:/app
      - ${DATA_DIR:-./data}/nvr_cache:/data/nvr_cache
      - ${DATA_DIR:-./data}/images:/data/images
      - ${DATA_DIR:-./data}/models:/data/models
    environment:
      <<: *backend-env
    depends_on:
      - postgres
      - redis
      - flask-api

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A wsgi:celery beat --loglevel=info --scheduler celery.beat:PersistentScheduler --schedule /app/celerybeat-data/celerybeat-schedule
    volumes:
      - ./backend:/app
      - celery_beat_data:/app/celerybeat-data
    environment:
      <<: *backend-env
    depends_on:
      - redis
      - flask-api

  detector-api:
    build:
      context: ./inference
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-zuoa/nutrition-monitoring}/inference:${VERSION:-latest}
    command: /bin/sh -c "exec gunicorn --bind 0.0.0.0:5000 --workers 1 --timeout 300 inference_wsgi:app"
    volumes:
      - ${INFERENCE_DATA_DIR:-./inference-data}/detector/models:/models/yolo
    environment:
      <<: *inference-env
      INFERENCE_SERVICE_ROLE: detector
      NVIDIA_VISIBLE_DEVICES: ${DETECTOR_GPU_DEVICE:-all}
    expose:
      - "5000"

  retrieval-api:
    build:
      context: ./inference
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-zuoa/nutrition-monitoring}/inference:${VERSION:-latest}
    command: /bin/sh -c "exec gunicorn --bind 0.0.0.0:5000 --workers 1 --timeout 300 inference_wsgi:app"
    volumes:
      - ${INFERENCE_DATA_DIR:-./inference-data}/retrieval/models:/data/models
      - ${INFERENCE_DATA_DIR:-./inference-data}/retrieval/index:/data/index
    environment:
      <<: *inference-env
      INFERENCE_SERVICE_ROLE: retrieval
      NVIDIA_VISIBLE_DEVICES: ${RETRIEVAL_GPU_DEVICE:-all}
    expose:
      - "5000"

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A wsgi:celery flower --port=5555
    environment:
      <<: *backend-env
    ports:
      - "5555:5555"
    depends_on:
      - redis

  # go2rtc - RTSP to WebRTC/LL-HLS stream server
  go2rtc:
    image: alexxit/go2rtc:latest
    ports:
      - "1984:1984"       # Web UI + API
      - "8554:8554"       # RTSP server
      - "8555:8555/tcp"   # WebRTC signaling / TCP
      - "8555:8555/udp"   # WebRTC ICE UDP
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    volumes:
      - ${DATA_DIR:-./data}/images:/data/images:ro
    depends_on:
      - flask-api

volumes:
  postgres_data:
  redis_data:
  celery_beat_data:

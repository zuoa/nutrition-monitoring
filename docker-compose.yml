version: '3.9'

x-backend-env: &backend-env
  FLASK_ENV: development
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: nutrition_db
  POSTGRES_USER: nutrition
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutrition_dev}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_DB: 0
  REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
  SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
  DINGTALK_APP_KEY: ${DINGTALK_APP_KEY:-}
  DINGTALK_APP_SECRET: ${DINGTALK_APP_SECRET:-}
  DINGTALK_AGENT_ID: ${DINGTALK_AGENT_ID:-}
  DINGTALK_CORP_ID: ${DINGTALK_CORP_ID:-}
  DINGTALK_WEBHOOK_TOKEN: ${DINGTALK_WEBHOOK_TOKEN:-}
  QWEN_API_KEY: ${QWEN_API_KEY:-}
  QWEN_API_URL: ${QWEN_API_URL:-https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation}
  QWEN_MODEL: ${QWEN_MODEL:-qwen-vl-max}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
  OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-chat}
  VIDEO_SOURCE_MODE: ${VIDEO_SOURCE_MODE:-nvr}
  HIKVISION_CAMERAS: '${HIKVISION_CAMERAS:-{}}'
  NVR_HOST: ${NVR_HOST:-}
  NVR_PORT: ${NVR_PORT:-8080}
  NVR_USERNAME: ${NVR_USERNAME:-}
  NVR_PASSWORD: ${NVR_PASSWORD:-}
  NVR_CHANNEL_IDS: ${NVR_CHANNEL_IDS:-1}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nutrition_db
      POSTGRES_USER: nutrition
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutrition_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrition"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  flask-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: /bin/sh -c "flask bootstrap-db && exec gunicorn --bind 0.0.0.0:5000 --workers 2 --reload --timeout 120 wsgi:app"
    volumes:
      - ./backend:/app
      - nvr_cache:/data/nvr_cache
      - images:/data/images
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_app worker --loglevel=info --concurrency=4 -Q celery
    volumes:
      - ./backend:/app
      - nvr_cache:/data/nvr_cache
      - images:/data/images
    environment:
      <<: *backend-env
    depends_on:
      - postgres
      - redis
      - flask-api

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    volumes:
      - ./backend:/app
      - celery_beat_data:/app/celerybeat-schedule
    environment:
      <<: *backend-env
    depends_on:
      - redis
      - flask-api

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_app flower --port=5555
    environment:
      <<: *backend-env
    ports:
      - "5555:5555"
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - flask-api

volumes:
  postgres_data:
  redis_data:
  nvr_cache:
  images:
  celery_beat_data:

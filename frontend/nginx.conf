server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to backend
    location /api {
        proxy_pass http://flask-api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy go2rtc under same origin so browser preview can use /rtc/api/ws
    location /rtc {
        proxy_pass http://go2rtc:1984;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Images - serve static files from /data/images
    location /images {
        alias /data/images;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ =404;
    }

    # Videos - serve downloaded recordings from /data/nvr_cache
    location /videos {
        alias /data/nvr_cache;
        add_header Accept-Ranges bytes;
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}

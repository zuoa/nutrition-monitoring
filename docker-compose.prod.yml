version: '3.9'

x-common-env: &common-env
  FLASK_ENV: production
  DATABASE_URL: postgresql://nutrition:${POSTGRES_PASSWORD}@postgres:5432/nutrition_db
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
  CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
  SECRET_KEY: ${SECRET_KEY}
  DINGTALK_APP_KEY: ${DINGTALK_APP_KEY}
  DINGTALK_APP_SECRET: ${DINGTALK_APP_SECRET}
  DINGTALK_AGENT_ID: ${DINGTALK_AGENT_ID}
  DINGTALK_CORP_ID: ${DINGTALK_CORP_ID}
  QWEN_API_KEY: ${QWEN_API_KEY}
  QWEN_MODEL: ${QWEN_MODEL:-qwen-vl-max}
  NVR_HOST: ${NVR_HOST}
  NVR_PORT: ${NVR_PORT:-8080}
  NVR_USERNAME: ${NVR_USERNAME}
  NVR_PASSWORD: ${NVR_PASSWORD}
  NVR_CHANNEL_IDS: ${NVR_CHANNEL_IDS:-1}
  FRONTEND_URL: ${FRONTEND_URL:-https://nutrition.school.edu.cn}

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: nutrition_db
      POSTGRES_USER: nutrition
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrition"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

  flask-api:
    image: ${REGISTRY:-ghcr.io}/nutrition-monitoring/api:${VERSION:-latest}
    restart: always
    command: gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 120 wsgi:app
    volumes:
      - nvr_cache:/data/nvr_cache
      - images:/data/images
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g

  celery-worker:
    image: ${REGISTRY:-ghcr.io}/nutrition-monitoring/api:${VERSION:-latest}
    restart: always
    command: celery -A celery_app worker --loglevel=info --concurrency=4 -Q celery
    volumes:
      - nvr_cache:/data/nvr_cache
      - images:/data/images
    environment:
      <<: *common-env
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          memory: 2g  # OpenCV needs more memory

  celery-beat:
    image: ${REGISTRY:-ghcr.io}/nutrition-monitoring/api:${VERSION:-latest}
    restart: always
    command: celery -A celery_app beat --loglevel=info
    volumes:
      - celery_beat_data:/app/celerybeat-schedule
    environment:
      <<: *common-env
    depends_on:
      - redis

  flower:
    image: ${REGISTRY:-ghcr.io}/nutrition-monitoring/api:${VERSION:-latest}
    restart: unless-stopped
    command: celery -A celery_app flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    environment:
      <<: *common-env
    expose:
      - "5555"  # internal only

  frontend:
    image: ${REGISTRY:-ghcr.io}/nutrition-monitoring/frontend:${VERSION:-latest}
    restart: always
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - flask-api
      - frontend
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  postgres_data:
  redis_data:
  nvr_cache:
  images:
  celery_beat_data:
  nginx_logs:

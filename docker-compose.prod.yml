version: '3.9'

x-backend-env: &backend-env
  FLASK_ENV: production
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: nutrition_db
  POSTGRES_USER: nutrition
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_DB: 0
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  SECRET_KEY: ${SECRET_KEY}
  DINGTALK_APP_KEY: ${DINGTALK_APP_KEY}
  DINGTALK_APP_SECRET: ${DINGTALK_APP_SECRET}
  DINGTALK_AGENT_ID: ${DINGTALK_AGENT_ID}
  DINGTALK_CORP_ID: ${DINGTALK_CORP_ID}
  DINGTALK_WEBHOOK_TOKEN: ${DINGTALK_WEBHOOK_TOKEN:-}
  QWEN_API_KEY: ${QWEN_API_KEY}
  QWEN_API_URL: ${QWEN_API_URL:-https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation}
  QWEN_MODEL: ${QWEN_MODEL:-qwen-vl-max}
  DISH_RECOGNITION_MODE: ${DISH_RECOGNITION_MODE:-local_embedding}
  LOCAL_REBUILD_SAMPLE_EMBEDDINGS_ON_UPLOAD: ${LOCAL_REBUILD_SAMPLE_EMBEDDINGS_ON_UPLOAD:-true}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
  OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-chat}
  VIDEO_SOURCE_MODE: ${VIDEO_SOURCE_MODE:-nvr}
  HIKVISION_CAMERAS: '${HIKVISION_CAMERAS:-{}}'
  NVR_HOST: ${NVR_HOST}
  NVR_PORT: ${NVR_PORT:-8080}
  NVR_USERNAME: ${NVR_USERNAME}
  NVR_PASSWORD: ${NVR_PASSWORD}
  NVR_CHANNEL_IDS: ${NVR_CHANNEL_IDS:-1}
  STABLE_FRAME_OFFSET_S: ${STABLE_FRAME_OFFSET_S:-0.2}
  ROI_REGION: '${ROI_REGION:-null}'
  PLATE_PIXEL_THRESHOLD: ${PLATE_PIXEL_THRESHOLD:-5000}
  TRAY_HSV_LOWER: '${TRAY_HSV_LOWER:-[5,70,70]}'
  TRAY_HSV_UPPER: '${TRAY_HSV_UPPER:-[35,255,255]}'
  TRAY_MIN_AREA_RATIO: ${TRAY_MIN_AREA_RATIO:-0.06}
  TRAY_MAX_AREA_RATIO: ${TRAY_MAX_AREA_RATIO:-0.75}
  TRAY_MIN_ASPECT_RATIO: ${TRAY_MIN_ASPECT_RATIO:-1.1}
  TRAY_MAX_ASPECT_RATIO: ${TRAY_MAX_ASPECT_RATIO:-2.8}
  TRAY_MIN_FILL_RATIO: ${TRAY_MIN_FILL_RATIO:-0.35}
  TRAY_EDGE_MARGIN_RATIO: ${TRAY_EDGE_MARGIN_RATIO:-0.02}
  TRAY_CENTER_MAX_RATIO: ${TRAY_CENTER_MAX_RATIO:-0.9}
  EVENT_SCAN_FPS: ${EVENT_SCAN_FPS:-6.0}
  EVENT_START_MOTION_THRESHOLD: ${EVENT_START_MOTION_THRESHOLD:-15}
  EVENT_START_FG_RATIO: ${EVENT_START_FG_RATIO:-0.008}
  EVENT_END_QUIET_S: ${EVENT_END_QUIET_S:-0.8}
  EVENT_PAD_BEFORE_S: ${EVENT_PAD_BEFORE_S:-0.4}
  EVENT_PAD_AFTER_S: ${EVENT_PAD_AFTER_S:-2.5}
  EVENT_MERGE_GAP_S: ${EVENT_MERGE_GAP_S:-0.6}
  POST_EVENT_SEARCH_S: ${POST_EVENT_SEARCH_S:-2.0}
  STABLE_FLOW_THRESHOLD: ${STABLE_FLOW_THRESHOLD:-1.2}
  MAX_OUTSIDE_FG_RATIO: ${MAX_OUTSIDE_FG_RATIO:-0.03}
  MIN_STABLE_RUN_S: ${MIN_STABLE_RUN_S:-0.25}
  STABLE_GAP_FRAMES: ${STABLE_GAP_FRAMES:-2}
  FRONTEND_URL: ${FRONTEND_URL:-http://nutrition.school.edu.cn}
  INFERENCE_API_TOKEN: ${INFERENCE_API_TOKEN:-cv2026}
  INFERENCE_API_TIMEOUT: ${INFERENCE_API_TIMEOUT:-180}
  INFERENCE_CONTROL_TIMEOUT: ${INFERENCE_CONTROL_TIMEOUT:-3}
  DETECTOR_API_BASE_URL: ${DETECTOR_API_BASE_URL:-http://10.0.4.29:5001}
  RETRIEVAL_API_BASE_URL: ${RETRIEVAL_API_BASE_URL:-http://10.0.4.29:5002}
  YOLO_MAX_REGIONS: ${YOLO_MAX_REGIONS:-6}

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: nutrition_db
      POSTGRES_USER: nutrition
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrition -d nutrition_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

  flask-api:
    image: ${REGISTRY:-ghcr.io}/zuoa/nutrition-monitoring/api:${VERSION:-latest}
    restart: always
    command: /bin/sh -c "flask bootstrap-db && exec gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 120 wsgi:app"
    volumes:
      - ${DATA_DIR:-./data}/nvr_cache:/data/nvr_cache
      - ${DATA_DIR:-./data}/images:/data/images
      - ${DATA_DIR:-./data}/models:/data/models
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g

  celery-worker:
    image: ${REGISTRY:-ghcr.io}/zuoa/nutrition-monitoring/api:${VERSION:-latest}
    restart: always
    command: celery -A wsgi:celery worker --loglevel=info --concurrency=4 -Q celery
    volumes:
      - ${DATA_DIR:-./data}/nvr_cache:/data/nvr_cache
      - ${DATA_DIR:-./data}/images:/data/images
      - ${DATA_DIR:-./data}/models:/data/models
    environment:
      <<: *backend-env
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          memory: 2g  # OpenCV needs more memory

  celery-beat:
    image: ${REGISTRY:-ghcr.io}/zuoa/nutrition-monitoring/api:${VERSION:-latest}
    restart: always
    command: celery -A wsgi:celery beat --loglevel=info --schedule /app/celerybeat-data/celerybeat-schedule
    volumes:
      - celery_beat_data:/app/celerybeat-data
    environment:
      <<: *backend-env
    depends_on:
      - redis

  flower:
    image: ${REGISTRY:-ghcr.io}/zuoa/nutrition-monitoring/api:${VERSION:-latest}
    restart: unless-stopped
    command: celery -A wsgi:celery flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    environment:
      <<: *backend-env
    expose:
      - "5555"  # internal only

  frontend:
    image: ${REGISTRY:-ghcr.io}/zuoa/nutrition-monitoring/frontend:${VERSION:-latest}
    restart: always
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "5080:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
      - ${DATA_DIR:-./data}/images:/data/images:ro
    depends_on:
      - flask-api
      - frontend
    deploy:
      resources:
        limits:
          memory: 128m

  go2rtc:
    image: alexxit/go2rtc:latest
    ports:
      - "1984:1984"       # Web UI + API
      - "8554:8554"       # RTSP server
      - "8555:8555/tcp"   # WebRTC signaling / TCP
      - "8555:8555/udp"   # WebRTC ICE UDP
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  celery_beat_data:
  nginx_logs:

# go2rtc configuration
# https://github.com/AlexxIT/go2rtc

# Stream definitions
streams:
  test:
    - rtsp://admin:YOUR_PASSWORD@10.0.4.11:554/Streaming/Channels/101
  camera1:
    - rtsp://admin:YOUR_PASSWORD@10.0.4.11:554/Streaming/Channels/101

# WebRTC settings - important for NAT traversal
webrtc:
  listen: ":8555"
  candidates:
    - stun:8555

# API and Web UI
api:
  listen: ":1984"
  base_path: "/rtc"
  origin: "*"

# Log level
log:
  # Temporary for WebRTC troubleshooting. Revert to info after preview works.
  level: trace

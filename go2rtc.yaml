# go2rtc configuration
# https://github.com/AlexxIT/go2rtc

# Stream definitions
# Add your Hikvision RTSP streams here
# Format: rtsp://username:password@host:port/path
streams:
  # Camera 1 - edit the RTSP URL below
  camera1:
    - rtsp://admin:password@192.168.1.100:554/Streaming/Channels/101
  # Camera 2 - uncomment and edit as needed
  # camera2:
  #   - rtsp://admin:password@192.168.1.101:554/Streaming/Channels/101

# WebRTC settings
webrtc:
  listen: ":8889"
  candidates:
    - 8189
    - stun:8555

# API and Web UI
api:
  listen: ":1984"
  origin: "*"

# Log level
log:
  level: info

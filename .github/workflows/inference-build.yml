name: Inference Image

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/nutrition-monitoring

jobs:
  inference-test:
    name: Inference — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: inference/requirements.txt

      - name: Install dependencies
        working-directory: inference
        run: pip install -r requirements.txt pytest flake8

      - name: Lint (flake8)
        working-directory: inference
        run: flake8 app/ --max-line-length=200 --ignore=E402,W503

      - name: Run tests
        working-directory: inference
        run: |
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests yet"

  build-inference-image:
    name: Build & Push Inference Image
    needs: [inference-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (inference)
        id: meta-inference
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/inference
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push inference
        uses: docker/build-push-action@v5
        with:
          context: inference
          push: true
          tags: ${{ steps.meta-inference.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
